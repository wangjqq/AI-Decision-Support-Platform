server:
  port: 8013
  servlet:
    context-path: /

spring:
  application:
    name: aidsp-web

  datasource:
    url: jdbc:mysql://localhost:3306/aidsp?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: aidsp
    password: aidsp123
    driver-class-name: com.mysql.cj.jdbc.Driver

  ai:
    # ========== Provider 切换 ==========
    # 通过注释 / 取消注释对应 provider 块来切换激活的 ChatModel。
    # 同一时刻只能激活一个 provider；其它 starter 仍然在 classpath 中但不会被装配。
    #
    # ----- OpenAI 官方（含 DeepSeek / 任何 OpenAI 兼容协议） -----
    openai:
      api-key: ${OPENAI_API_KEY:placeholder-key}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
          temperature: 0.4

    # ----- 阿里云 通义千问 (DashScope) -----
    # 取消下面整段注释，并把 placeholder 替换为真实 key 即可激活
    # dashscope:
    #   api-key: ${DASHSCOPE_API_KEY:placeholder-key}
    #   chat:
    #     options:
    #       model: ${DASHSCOPE_MODEL:qwen-plus}

    # ----- Ollama 本地部署 -----
    # 取消下面整段注释即可激活（确保 ollama serve 已在 11434 端口运行）
    # ollama:
    #   base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    #   chat:
    #     options:
    #       model: ${OLLAMA_MODEL:qwen2.5:7b}
    #       temperature: 0.4

# 自定义：是否仅使用 Mock Agent（不调真实 LLM；用于本地无 key 时演示）
aidsp:
  agent:
    # 默认为 false：使用 LLM 真实调用
    # 设为 true：仅注册 Mock Agent，LLM 失败时不报错（开发演示模式）
    mock-only: ${AIDSP_AGENT_MOCK_ONLY:false}

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.aidsp.platform.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
  openapi:
    title: AI Decision Support Platform API
    description: 决策支持平台接口文档
    version: 1.0.0
    concat: architect@aidsp.com

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# Dubbo
dubbo:
  application:
    name: aidsp-web
    qos-enable: false
  protocol:
    name: tri
    port: -1
  registry:
    address: N/A
  consumer:
    check: false
    timeout: 5000
  scan:
    base-packages: com.aidsp.platform

# Logging
logging:
  level:
    com.aidsp.platform: DEBUG
    org.apache.dubbo: INFO
    com.baomidou.mybatisplus: INFO
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'
