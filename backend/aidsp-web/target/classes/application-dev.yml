# ============================================================
# dev profile：本地开发冒烟测试（默认生产仍用 MySQL）
# 启动方式：java -jar aidsp-web.jar --spring.profiles.active=dev
# ============================================================
spring:
  datasource:
    url: jdbc:h2:mem:aidsp;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password: ''
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:h2-schema.sql
      continue-on-error: true
  h2:
    console:
      enabled: true
      path: /h2
  # 关闭 Spring AI / DashScope（避免 dev 模式因缺 key 启动失败；mock agent 接管）
  autoconfigure:
    exclude:
      - org.springframework.ai.model.chat.client.autoconfigure.ChatClientAutoConfiguration
      - org.springframework.ai.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.ollama.autoconfigure.OllamaChatAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeChatAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAgentAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeEmbeddingAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioSpeechAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioTranscriptionAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeImageAutoConfiguration

# 自定义：dev 模式使用 mock agent（不调真实 LLM）
aidsp:
  agent:
    mock-only: true

# MyBatis-Plus 关闭 banner 减少噪音
mybatis-plus:
  global-config:
    banner: false
