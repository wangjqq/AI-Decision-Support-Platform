# ============================================================
# dev profile：本地开发冒烟测试（默认生产仍用 MySQL）
# 启动方式：java -jar aidsp-web.jar --spring.profiles.active=dev
# ============================================================
spring:
  datasource:
    url: jdbc:h2:mem:aidsp;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:h2-schema.sql
      continue-on-error: true
  h2:
    console:
      enabled: true
      path: /h2

# MyBatis-Plus 关闭 banner 减少噪音
mybatis-plus:
  global-config:
    banner: false
